<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <meta name="description"
        content="Électricien expert à Saint-Tropez et dans le Golfe. Installations, dépannages et rénovations électriques haut de gamme pour villas et propriétés de prestige." />

    <title>Voltaire Électricité — Électricien Saint-Tropez</title>

    <!-- PRELOAD LCP IMAGE (CRUCIAL) -->
    <link rel="preload" as="image" href="image/tableau-electricite.webp">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />

    <!-- CSS NON BLOQUANT -->
    <link rel="stylesheet" href="./css/fonts.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="./css/style.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="./css/index.css" media="print" onload="this.media='all'">

    <!-- fallback -->
    <noscript>
        <link rel="stylesheet" href="./css/style.css">
        <link rel="stylesheet" href="./css/index.css">
    </noscript>

</head>

<body>

    <!-- HERO -->
    <section id="hero">

        <div class="hero-bg">
            <img src="image/tableau-electricite.webp" alt="tableau electricite" id="hero-img" loading="eager"
                fetchpriority="high" decoding="async" width="1920" height="1080" />
            <div class="hero-overlay"></div>
        </div>

        <div class="hero-content">
            <p class="hero-eyebrow">Électricien certifié · Saint-Tropez</p>

            <h1 class="hero-title">
                L'excellence<br />au service<br /><em>de votre demeure</em>
            </h1>

            <p class="hero-sub">
                Installations électriques, domotique et dépannage pour villas,
                propriétés de prestige et yachts dans le Golfe de Saint-Tropez.
            </p>

            <div class="hero-actions">
                <a href="contact.html" class="btn-primary">Demander un devis</a>
                <a href="realisations.html" class="btn-ghost">Voir nos réalisations</a>
            </div>
        </div>

    </section>

    <!-- JS DEFER -->
    <script src="./js/main.js" defer></script>
    <script src="./js/index.js" defer></script>

</body>

</html>
